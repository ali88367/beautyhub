<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fff6fa" />
    <title>Beauty Store Admin</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: linear-gradient(180deg, #fff6fa 0%, #ffffff 100%);
        font-family: "Poppins", system-ui, -apple-system, sans-serif;
      }

      .netlify-identity-widget {
        font-family: "Poppins", system-ui, -apple-system, sans-serif !important;
      }

      @media (max-width: 640px) {
        .netlify-identity-widget .modal {
          width: 92% !important;
          margin: 0 auto !important;
        }
      }
    </style>
  </head>
  <body>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.6.0/dist/decap-cms.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
