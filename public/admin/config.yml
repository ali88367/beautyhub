backend:
  name: git-gateway
  branch: main

publish_mode: simple
show_preview_links: false

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "content/products"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    identifier_field: "product_name"
    summary: "{{product_name}} - {{price}}"
    editor:
      preview: false
    fields:
      - label: "Product Name"
        name: "product_name"
        widget: "string"
      - label: "Price"
        name: "price"
        widget: "string"
      - label: "Original Price (Old)"
        name: "original_price"
        widget: "string"
        required: false
        hint: "Optional. Show as old price when discount is set."
      - label: "Discounted Price"
        name: "discount_price"
        widget: "string"
        required: false
        hint: "Optional. If set, this is the price shown to customers."
      - label: "Description"
        name: "description"
        widget: "text"
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Skincare"
          - "Makeup"
      - label: "Best Seller"
        name: "best_seller"
        widget: "boolean"
        default: false
        required: false
      - label: "Images"
        name: "images"
        widget: "list"
        min: 1
        allow_add: true
        field:
          label: "Image"
          name: "item"
          widget: "image"
          choose_url: false
