backend:
  name: git-gateway
  branch: main

publish_mode: simple
show_preview_links: false

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "content/products"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    identifier_field: "product_name"
    summary: "{{product_name}} - {{price}}"
    editor:
      preview: false
    fields:
      - label: "Main Image"
        name: "cover_image"
        widget: "image"
        required: false
        choose_url: false
        hint: "This is the image shown on product cards and as the first image on the product page."
      - label: "Extra Images"
        name: "gallery_images"
        widget: "list"
        required: false
        allow_add: true
        collapsed: true
        hint: "Optional. Add more photos for the product gallery."
        field:
          label: "Image"
          name: "item"
          widget: "image"
          choose_url: false
      - label: "Product Name"
        name: "product_name"
        widget: "string"
      - label: "Price"
        name: "price"
        widget: "string"
        hint: "Example: 3600 or PKR 3,600"
      - label: "Sale Price"
        name: "discount_price"
        widget: "string"
        required: false
        hint: "Optional. If set, this is the price shown to customers."
      - label: "Compare At Price"
        name: "original_price"
        widget: "string"
        required: false
        hint: "Optional. Shows as the crossed-out old price."
      - label: "Description"
        name: "description"
        widget: "text"
        hint: "Use line breaks for benefits, ingredients, and usage."
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Skincare"
          - "Makeup"
      - label: "Best Seller"
        name: "best_seller"
        widget: "boolean"
        default: false
        required: false
